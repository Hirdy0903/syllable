services:
  postgres:
    image: postgres:17
    container_name: syllable-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: syllable

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: syllable-redis

    ports:
      - "6379:6379"

volumes:
  postgres_data: